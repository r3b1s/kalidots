backend = "glx";
vsync = true;
shadow = true;
fading = false;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
frame-opacity = 1.0;
unredir-if-possible = true;

opacity-rule = [
  "98:focused || group_focused",
  "80:!focused && !group_focused",
  "100:_NET_WM_STATE@[0]:32a = '_NET_WM_STATE_FULLSCREEN'",
  "100:_NET_WM_STATE@[1]:32a = '_NET_WM_STATE_FULLSCREEN'",
  "100:_NET_WM_STATE@[2]:32a = '_NET_WM_STATE_FULLSCREEN'",
  "100:_NET_WM_STATE@[3]:32a = '_NET_WM_STATE_FULLSCREEN'",
  "100:_NET_WM_STATE@[4]:32a = '_NET_WM_STATE_FULLSCREEN'",
  "100:class_g = 'i3lock'",
  "100:class_g = 'i3-nagbar'",
  "100:class_g = 'Rofi'",
  "100:class_g = 'Dunst'",
  "100:class_g = 'flameshot'",
  "100:class_g = 'gpick'",
  "100:class_g = 'slop'",
  "100:class_g = 'Nm-connection-editor'",
  "100:class_g = 'Pavucontrol'",
  "100:class_g = 'Blueman-manager'",
  "100:window_type = 'menu'",
  "100:window_type = 'dropdown_menu'",
  "100:window_type = 'popup_menu'",
  "100:window_type = 'tooltip'",
  "100:window_type = 'notification'",
  "100:window_type = 'combo'",
  "100:window_type = 'dnd'"
];
