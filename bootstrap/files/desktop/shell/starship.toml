# Starship prompt configuration
format = """
$directory\
$git_branch\
$git_status\
$python\
$rust\
$golang\
$ruby\
$character"""

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
vimcmd_symbol = "[<](bold green)"

[directory]
truncation_length = 1
truncate_to_repo = false
style = "bold cyan"
format = "[$path]($style) "

[git_branch]
symbol = "git:"
style = "bold yellow"
format = "[$symbol$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "red"
