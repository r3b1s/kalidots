[icons]
icons = "material-nf"

[theme]
theme = "dracula"

[[block]]
block = "custom"
command = "[ -f /tmp/i3-recording-active ] && echo REC"
format = " $text "
interval = 2
[block.theme_overrides]
idle_fg = "#ff5555"

[[block]]
block = "net"
format = " $icon {$signal_strength $ssid $frequency|Wired} via $device "
format_alt = " $icon {$ip|Down} "
interval = 10

[[block]]
block = "disk_space"
path = "/"
info_type = "available"
alert_unit = "GB"
interval = 30
warning = 20.0
alert = 10.0
format = " $icon $available.eng(w:2) "

[[block]]
block = "memory"
format = " $icon $mem_total_used_percents.eng(w:2) "
format_alt = " $icon_swap $swap_used_percents.eng(w:2) "
interval = 5

[[block]]
block = "cpu"
interval = 5
info_cpu = 20
warning_cpu = 50
critical_cpu = 90

[[block]]
block = "load"
format = " $icon $1m.eng(w:4) "
interval = 5

[[block]]
block = "sound"
format = " $icon $volume "
[[block.click]]
button = "left"
cmd = "pavucontrol"

[[block]]
block = "time"
interval = 5
format = " $icon $timestamp.datetime(f:'%a %d %b %R') "
