[icons]
icons = "material-nf"

[theme]
theme = "pink-rot"

[[block]]
block = "custom"
command = "[ -f /tmp/i3-recording-active ] && echo REC"
format = " $text "
interval = 2
[block.theme_overrides]
idle_bg = "#7a1230"
idle_fg = "#E80F3E"
info_bg = "#a31842"
info_fg = "#fff1f5"

[[block]]
block = "net"
format = " $icon {$signal_strength $ssid $frequency|Wired} via $device "
format_alt = " $icon {$ip|Down} "
interval = 10
[block.theme_overrides]
idle_bg = "#3c1631"
idle_fg = "#ffd4e5"
info_bg = "#5c1d47"
info_fg = "#fff0f7"
good_bg = "#7e255f"
good_fg = "#fff3f9"

[[block]]
block = "disk_space"
path = "/"
info_type = "available"
alert_unit = "GB"
interval = 30
warning = 20.0
alert = 10.0
format = " $icon $available.eng(w:2) "
[block.theme_overrides]
idle_bg = "#442018"
idle_fg = "#ffd8ca"
info_bg = "#6a2e1a"
info_fg = "#fff1eb"
warning_bg = "#b34d17"
warning_fg = "#fff1de"
critical_bg = "#e15a2a"
critical_fg = "#fff3ee"

[[block]]
block = "memory"
format = " $icon $mem_total_used_percents.eng(w:2) "
format_alt = " $icon_swap $swap_used_percents.eng(w:2) "
interval = 5
[block.theme_overrides]
idle_bg = "#2f2447"
idle_fg = "#ead7ff"
info_bg = "#473169"
info_fg = "#f8f0ff"
warning_bg = "#7d46a8"
warning_fg = "#fff4ff"
critical_bg = "#b03c9d"
critical_fg = "#fff2fd"

[[block]]
block = "cpu"
interval = 5
info_cpu = 20
warning_cpu = 50
critical_cpu = 90
[block.theme_overrides]
idle_bg = "#4e1526"
idle_fg = "#ffc7d5"
info_bg = "#7a1230"
info_fg = "#fff0f4"
warning_bg = "#b31f4a"
warning_fg = "#fff2f6"
critical_bg = "#d40d40"
critical_fg = "#fff0f4"

[[block]]
block = "load"
format = " $icon $1m.eng(w:4) "
interval = 5
[block.theme_overrides]
idle_bg = "#4c2b18"
idle_fg = "#f9ddc8"
info_bg = "#6f3b1b"
info_fg = "#fff1e7"
warning_bg = "#a85a15"
warning_fg = "#fff2e0"
critical_bg = "#cf4a17"
critical_fg = "#fff1ea"

[[block]]
block = "sound"
format = " $icon $volume "
[block.theme_overrides]
idle_bg = "#3b163a"
idle_fg = "#ffd1ff"
info_bg = "#5b2060"
info_fg = "#fff0ff"
warning_bg = "#8e2f8e"
warning_fg = "#fff3ff"
[[block.click]]
button = "left"
cmd = "pavucontrol"

[[block]]
block = "time"
interval = 5
format = " $icon $timestamp.datetime(f:'%a %d %b %R') "
[block.theme_overrides]
idle_bg = "#182d4c"
idle_fg = "#cfe6ff"
info_bg = "#20456f"
info_fg = "#eef6ff"
