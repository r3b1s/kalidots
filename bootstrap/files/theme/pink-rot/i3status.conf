general {
  colors = true
  interval = 5
  color_good = "#f17e97"
  color_degraded = "#ce0d3c"
  color_bad = "#ffccd7"
}

order += "ethernet _first_"
order += "wireless _first_"
order += "disk /"
order += "memory"
order += "cpu_usage"
order += "tztime local"

ethernet _first_ {
  format_up = " 󰈀  %ip "
  format_down = ""
}

wireless _first_ {
  format_up = " 󰖩  %essid %quality "
  format_down = ""
}

disk "/" {
  format = " 󰋊  %avail "
  low_threshold = 10
  threshold_type = "gbytes_avail"
}

memory {
  format = "   %used "
  threshold_degraded = "1G"
  format_degraded = "   %used "
}

cpu_usage {
  format = "   %usage "
}

tztime local {
  format = " 󰃰  %Y-%m-%d %H:%M "
}
