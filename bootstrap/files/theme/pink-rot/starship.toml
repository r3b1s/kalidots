# Starship prompt configuration - pink-rot theme
format = """
$directory\
$git_branch\
$git_status\
$python\
$rust\
$golang\
$ruby\
$character"""

[character]
success_symbol = "[>](bold #AF0B39)"
error_symbol = "[>](bold #8F0936)"
vimcmd_symbol = "[<](bold #AF0B39)"

[directory]
truncation_length = 2
truncate_to_repo = false
style = "bold #D40D40"
format = "[$path]($style) "

[git_branch]
symbol = "git:"
style = "bold #f17e97"
format = "[$symbol$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "#a85869"
